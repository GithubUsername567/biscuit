name: build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: |
          xcodebuild -project NotchAssistant.xcodeproj \
            -scheme NotchAssistant \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            build
